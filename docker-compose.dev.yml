services:
  backend:
    build:
      context: ./backend
      target: dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    volumes:
      - ./backend:/app
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  frontend:
    build: null
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:5173"
    environment:
      VITE_API_BASE: http://localhost:8080
