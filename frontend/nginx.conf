server {
    listen 80;
    resolver 127.0.0.11 valid=10s;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream_backend http://backend:8080;
        proxy_pass $upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # go2rtc live stream player page (MSE/WebRTC iframe for LiveView)
    location /stream.html {
        proxy_pass http://10.1.1.252:1984;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # go2rtc MSE WebSocket — must come before /api/ to take priority
    location /api/ws {
        proxy_pass http://10.1.1.252:1984/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # go2rtc WebRTC WebSocket — must come before /api/ to take priority
    location /api/webrtc {
        proxy_pass http://10.1.1.252:1984;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /ws/ {
        set $upstream_backend http://backend:8080;
        proxy_pass $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /go2rtc/ {
        proxy_pass http://10.1.1.252:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin "*" always;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}